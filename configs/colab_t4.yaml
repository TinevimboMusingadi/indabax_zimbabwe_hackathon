# Colab T4 GPU — ~25-40 min
seed: 42

data:
  n_folds: 5

features:
  variants:
    - v2_ordinal
    - v3_target_woe
  target_encoder_smoothing: 10.0
  run_adversarial: true

training:
  use_gpu: true
  models:
    - name: lgbm
      variant: v3_target_woe
      params:
        n_estimators: 3000
        num_leaves: 31
        learning_rate: 0.01
        subsample: 0.8
        colsample_bytree: 0.8
        reg_alpha: 0.1
        reg_lambda: 1.0
    - name: lgbm
      variant: v2_ordinal
      params:
        n_estimators: 3000
        num_leaves: 31
        learning_rate: 0.01
        subsample: 0.8
        colsample_bytree: 0.8
        reg_alpha: 0.1
        reg_lambda: 1.0
    - name: xgb
      variant: v3_target_woe
      params:
        n_estimators: 3000
        max_depth: 6
        learning_rate: 0.01
        subsample: 0.8
        colsample_bytree: 0.8
        reg_alpha: 0.1
        reg_lambda: 1.0
    - name: xgb
      variant: v2_ordinal
      params:
        n_estimators: 3000
        max_depth: 6
        learning_rate: 0.01
        subsample: 0.8
        colsample_bytree: 0.8
        reg_alpha: 0.1
        reg_lambda: 1.0
    - name: catboost
      variant: v3_target_woe
      params:
        iterations: 3000
        depth: 6
        learning_rate: 0.01

tuner:
  enabled: true
  n_trials: 50
  models_to_tune:
    - lgbm
    - xgb
    - catboost

ensemble:
  methods:
    - rank_avg
    - stacking
    - optuna_blend
  optuna_blend_trials: 200
