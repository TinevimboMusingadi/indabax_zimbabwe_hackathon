# CPU-friendly smoke test — ~5-10 min on a laptop
seed: 42

data:
  n_folds: 3

features:
  variants:
    - v2_ordinal
    - v3_target_woe
  target_encoder_smoothing: 10.0
  run_adversarial: false

training:
  use_gpu: false
  models:
    - name: lgbm
      variant: v3_target_woe
      params:
        n_estimators: 1000
        num_leaves: 31
        learning_rate: 0.02
    - name: xgb
      variant: v3_target_woe
      params:
        n_estimators: 1000
        max_depth: 6
        learning_rate: 0.02

tuner:
  enabled: false

ensemble:
  methods:
    - rank_avg
  optuna_blend_trials: 0
