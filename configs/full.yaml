# Full suite — ~90 min on GPU
seed: 42

data:
  n_folds: 5

features:
  variants:
    - v1_ohe
    - v2_ordinal
    - v3_target_woe
  target_encoder_smoothing: 10.0
  run_adversarial: true

training:
  use_gpu: true
  models:
    - name: lgbm
      variant: v2_ordinal
      params:
        n_estimators: 2000
        num_leaves: 63
        learning_rate: 0.03
    - name: xgb
      variant: v2_ordinal
      params:
        n_estimators: 2000
        max_depth: 7
        learning_rate: 0.03
    - name: catboost
      variant: v2_ordinal
      params:
        iterations: 2000
        depth: 7
        learning_rate: 0.03
    - name: lr
      variant: v1_ohe
    - name: rf
      variant: v1_ohe
      params:
        n_estimators: 500
    - name: extra_trees
      variant: v1_ohe
      params:
        n_estimators: 500
    - name: tabnet
      variant: v2_ordinal
      params:
        n_d: 64
        n_a: 64
        n_steps: 5
        max_epochs: 200
    - name: mlp
      variant: v3_target_woe
      params:
        hidden_dims: [256, 128, 64]
        dropout: 0.3
        lr: 0.001
        epochs: 100

tuner:
  enabled: true
  n_trials: 100
  models_to_tune:
    - lgbm
    - xgb
    - catboost

ensemble:
  methods:
    - rank_avg
    - stacking
    - optuna_blend
  optuna_blend_trials: 500
